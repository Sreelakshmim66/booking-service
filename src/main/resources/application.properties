server.port=8083

spring.application.name=booking-service
spring.datasource.url=jdbc:h2:mem:bookingdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

grpc.server.port=9093
grpc.client.trip-service.address=discovery:///TRIP-SERVICE
grpc.client.trip-service.negotiation-type=plaintext
grpc.client.notification-service.address=discovery:///NOTIFICATION-SERVICE
grpc.client.notification-service.negotiation-type=plaintext

app.jwt.secret=myVerySecretKeyForJWTSigningThatIsLongEnough123456
